<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENNISFERA - Vendas</title>
    <style>
        body {
            background-color:#bcd3d1;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .barra-navegacao {
            background-color: #0F4770; 
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .barra-navegacao h4 {
            margin: 0; 
            color: white; 
            font-size: 35px; 
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif; 
        }

        .menu-links {
            display: flex;
            gap: 35px;
        }

        .menu-links a {
            color: white;
            text-decoration: none;
            font-size: 18px; 
        }

        .container-principal {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .titlesessao {
            background-color: #0f487075;
            padding: 15px;
            color: #fff;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .tabela-vendas {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .tabela-vendas th, .tabela-vendas td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
            text-align: left;
        }

        .tabela-vendas th {
            background-color: #0F4770;
            color: white;
            font-family: 'Franklin Gothic Medium', Arial, sans-serif;
            font-size: 14px;
        }

        .preco-tabela {
            font-weight: bold;
            color: #940909;
        }

        .total-vendas {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
        }

        @media (max-width: 800px) {
            .tabela-vendas thead { display: none; }
            .tabela-vendas, .tabela-vendas tbody, .tabela-vendas tr, .tabela-vendas td { display: block; width: 100%; }
            .tabela-vendas tr { margin-bottom: 15px; }
            .tabela-vendas td { text-align: right; padding-left: 50%; position: relative; }
            .tabela-vendas td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                width: 45%;
                text-align: left;
                font-weight: bold;
            }
        }
    </style>
</head>
<body>
    <header class="barra-navegacao">
        <h4>
            <a style="text-decoration: none; color: #fff;" href="adiministrativo.html">TENNISFERA ADM</a>
        </h4>
        <nav class="menu-links">
            <a href="EstoqueFeminino.html">Estoque Feminino</a>
            <a href="EstoqueMasculino.html">Estoque Masculino</a>
            <a href="EstoqueInfantil.html">Estoque Infantil</a>
            <a href="vendas.html">Vendas</a>
        </nav>
    </header>

    <div class="container-principal">
        <div class="titlesessao">RELATÓRIO DE VENDAS</div>

        <table class="tabela-vendas">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Produto</th>
                    <th>Categoria</th>
                    <th>Quantidade</th>
                    <th>Preço Unitário</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td data-label="Data">25/09/2025</td>
                    <td data-label="Produto">EXPLORADOR ESTELAR</td>
                    <td data-label="Categoria">Infantil</td>
                    <td data-label="Quantidade">2</td>
                    <td data-label="Preço Unitário" class="preco-tabela">R$ 129,90</td>
                    <td data-label="Total" class="preco-tabela">R$ 259,80</td>
                </tr>
                <tr>
                    <td data-label="Data">25/09/2025</td>
                    <td data-label="Produto">ENERGIA</td>
                    <td data-label="Categoria">Masculino</td>
                    <td data-label="Quantidade">1</td>
                    <td data-label="Preço Unitário" class="preco-tabela">R$ 359,90</td>
                    <td data-label="Total" class="preco-tabela">R$ 359,90</td>
                </tr>
            </tbody>
        </table>

        <div class="total-vendas">
            Total de Vendas: <span class="preco-tabela">R$ 619,70</span>
        </div>
    </div>
</body>
</html>
